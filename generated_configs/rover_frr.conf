! Rover FRR Config (OSPF + Babel + PIM)
!
router pim
 rp 192.168.254.1 224.0.0.0/4
!
interface eth0.99
 ip pim
!
route-map BABEL_TO_OSPF permit 10
 set tag 8888
!
route-map OSPF_TO_BABEL deny 10
 match tag 8888
route-map OSPF_TO_BABEL permit 20
!
router ospf
 ospf router-id 10.99.1.2
 network 10.99.1.0/30 area 0
 redistribute babel route-map BABEL_TO_OSPF
!
router babel
 babel diversity
 redistribute ipv4 ospf route-map OSPF_TO_BABEL
 network eth0.24
 network eth0.900
!
interface eth0.24
 ip pim
 babel wireless
 no babel split-horizon
 babel channel 1
 babel rxcost 250
 babel hello-interval 1000
 babel enable-timestamps
!
interface eth0.900
 ip pim
 babel wireless
 no babel split-horizon
 babel channel 2
 babel rxcost 400
 babel hello-interval 1000
 babel enable-timestamps
!