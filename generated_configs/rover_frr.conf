! Rover FRR Config
interface end0.99
 ip pim

router ospf
 ospf router-id 10.99.1.2
 network 10.99.1.0/30 area 0
 redistribute babel
 redistribute connected

router babel
 babel diversity
 redistribute ipv4 ospf
 network end0.900
 network end0.24

interface end0.900
 ip pim
 babel wireless
 no babel split-horizon
 babel channel 1
 babel rxcost 500
 babel hello-interval 1000
 babel update-interval 4000
 babel enable-timestamps
 babel max-rtt-penalty 150

interface end0.24
 ip pim
 babel wireless
 no babel split-horizon
 babel channel 2
 babel rxcost 250
 babel hello-interval 1000
 babel update-interval 4000
 babel enable-timestamps
 babel max-rtt-penalty 150
